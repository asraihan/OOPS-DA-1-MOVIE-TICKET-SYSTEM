<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infiniplex | WebAssembly Movie Booking</title>
    <meta name="description" content="A seamless, high-performance web-based terminal for movie ticket bookings, running entirely in your browser via WebAssembly.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>

    <main class="app-container">
        <header class="app-header">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M19.82 2H4.18C2.97602 2 2 2.97602 2 4.18V19.82C2 21.024 2.97602 22 4.18 22H19.82C21.024 22 22 21.024 22 19.82V4.18C22 2.97602 21.024 2 19.82 2Z" stroke="url(#paint0_linear)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M7 2V22" stroke="url(#paint0_linear)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M17 2V22" stroke="url(#paint0_linear)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 12H22" stroke="url(#paint0_linear)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 7H7" stroke="url(#paint0_linear)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 17H7" stroke="url(#paint0_linear)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M17 17H22" stroke="url(#paint0_linear)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M17 7H22" stroke="url(#paint0_linear)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <defs>
                        <linearGradient id="paint0_linear" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#FF512F" />
                            <stop offset="1" stop-color="#DD2476" />
                        </linearGradient>
                    </defs>
                </svg>
                <h1>Infiniplex</h1>
            </div>
            <div class="status-badge" id="app-status">
                <span class="status-dot"></span>
                <span id="status-text">Booting Engine...</span>
            </div>
        </header>

        <section class="terminal-glass">
            <div class="terminal-header">
                <div class="window-controls">
                    <span class="control close"></span>
                    <span class="control minimize"></span>
                    <span class="control expand"></span>
                </div>
                <div class="terminal-title">WASM Console Process</div>
            </div>
            <div class="terminal-body" id="output-container" style="white-space: pre-wrap; overflow-y: auto;"></div>
            
            <div class="terminal-footer">
                <p class="help-text">System interactive prompts will appear naturally in your browser window.</p>
            </div>
        </section>
        
        <!-- Emscripten Canvas Requirement (Hidden) -->
        <canvas id="canvas" style="display: none;"></canvas>
    </main>

    <script>
        const statusText = document.getElementById("status-text");
        const statusBadge = document.getElementById("app-status");
        // outputElement is now a div
        const outputContainer = document.getElementById("output-container");

        var Module = {
            preRun: [function() {
                FS.mkdir('/data');
                FS.mount(IDBFS, {}, '/data');
                FS.syncfs(true, function (err) { });
            }],
            postRun: [],
            print: (function() {
                return function(text) {
                    if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
                    let span = document.createElement('span');
                    span.innerText = text + '\n';
                    outputContainer.appendChild(span);
                    outputContainer.scrollTop = outputContainer.scrollHeight;
                };
            })(),
            printErr: function(text) {
                if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
                console.error(text);
            },
            canvas: (function() {
                var canvas = document.getElementById('canvas');
                return canvas;
            })(),
            setStatus: function(text) {
                if (!Module.setStatus.last) Module.setStatus.last = { time: Date.now(), text: '' };
                if (text === Module.setStatus.last.text) return;
                var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
                if (m) {
                    text = m[1];
                }
                statusText.innerHTML = text;
                if(text.trim() === '') {
                    statusText.innerHTML = 'System Online';
                    statusBadge.classList.add('online');
                }
            },
            totalDependencies: 0,
            monitorRunDependencies: function(left) {
                this.totalDependencies = Math.max(this.totalDependencies, left);
                Module.setStatus(left ? 'Preparing... (' + (this.totalDependencies-left) + '/' + this.totalDependencies + ')' : 'All downloads complete.');
            }
        };
        Module.setStatus('Downloading...');
        window.onerror = function(event) {
            Module.setStatus('Exception thrown, see JS console');
            statusBadge.classList.remove('online');
            statusBadge.classList.add('error');
        };

    </script>
    <script async src="index.js"></script>
</body>
</html>
